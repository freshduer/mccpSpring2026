<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster export demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 20px; }
    #poster {
      width: 600px;
      height: 800px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eee;
      padding: 48px;
      border-radius: 8px;
    }
    #poster h1 { font-size: 36px; margin: 0 0 16px; }
    #poster .sub { font-size: 18px; opacity: 0.9; margin-bottom: 32px; }
    #poster .block { background: rgba(255,255,255,0.08); padding: 24px; border-radius: 8px; margin-top: 24px; }
    .controls { margin-top: 16px; }
    .controls button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="poster">
    <h1>MCCP Spring 2026</h1>
    <p class="sub">Presentation 2 — Poster design demo</p>
    <div class="block">
      <p>Inspired by poster-design: export with html2canvas in the browser.</p>
    </div>
  </div>
  <div class="controls">
    <button id="exportBtn">Export PNG</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    document.getElementById('exportBtn').onclick = function () {
      var el = document.getElementById('poster');
      html2canvas(el, {
        useCORS: true,
        scale: 2,
        backgroundColor: null
      }).then(function (canvas) {
        var link = document.createElement('a');
        link.download = 'poster-export.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    };
  </script>
</body>
</html>
