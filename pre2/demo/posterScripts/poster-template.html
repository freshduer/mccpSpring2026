<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster template</title>
  <style>
    .poster {
      width: 600px;
      height: 800px;
      padding: 48px;
      background: #fff;
      color: #222;
      font-family: Georgia, serif;
    }
    .poster .title { font-size: 42px; font-weight: bold; margin-bottom: 8px; }
    .poster .subtitle { font-size: 20px; color: #555; margin-bottom: 32px; }
    .poster .body { font-size: 16px; line-height: 1.6; }
    .poster .qr-placeholder {
      width: 120px; height: 120px;
      background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #999; margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="title">Your poster title</div>
    <div class="subtitle">Subtitle or event name</div>
    <div class="body">
      <p>Replace this with your content. You can add images, change colors, and use this as the source for html2canvas or Puppeteer export.</p>
    </div>
    <div class="qr-placeholder">QR code</div>
  </div>
</body>
</html>
